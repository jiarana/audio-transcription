<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transcripción de Audio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Login -->
  <div id="loginBox" class="container">
    <h1>Transcripción de Audio</h1>
    <p class="subtitle">Introduce tus credenciales para acceder.</p>
    <div class="form-group">
      <label for="username" class="sr-only">Usuario</label>
      <input type="text" id="username" placeholder="Usuario" autocomplete="username" />
    </div>
    <div class="form-group">
      <label for="password" class="sr-only">Contraseña</label>
      <input type="password" id="password" placeholder="Contraseña" autocomplete="current-password" onkeydown="if(event.key==='Enter') doLogin()" />
    </div>
    <button onclick="doLogin()">Entrar</button>
    <div id="loginStatus" class="status hidden" aria-live="polite"></div>
  </div>

  <!-- App -->
  <div id="appBox" class="container hidden">
    <div class="app-header">
      <h1>Transcripción de Audio</h1>
      <button class="btn-logout" onclick="logout()">Cerrar sesion</button>
    </div>
    <p class="subtitle">Sube un archivo de audio o video y obtén su transcripción.</p>

    <div class="upload-box">
      <label for="audioFile" class="sr-only">Seleccionar archivo de audio o video</label>
      <input type="file" id="audioFile" accept="audio/*,video/*" style="display:none" onchange="updateFileName()" />
      <button id="selectFileBtn" class="btn-secondary" onclick="document.getElementById('audioFile').click()">Seleccionar archivo</button>
      <span id="fileName" class="file-name">Ningún archivo seleccionado</span>
      <button id="transcribeBtn" onclick="transcribe()">Transcribir</button>
    </div>

    <div id="status" class="status hidden" aria-live="polite"></div>

    <div id="resultBox" class="result-box hidden">
      <div id="infoBox" class="info-box">
        <span id="infoFile"></span>
        <span id="infoDuration"></span>
        <span id="infoTime"></span>
      </div>
      <h2>Transcripcion:</h2>
      <p id="resultText"></p>
      <div class="result-actions">
        <button onclick="saveText()">Guardar texto</button>
        <button class="btn-secondary" onclick="resetApp()">Nueva transcripcion</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
